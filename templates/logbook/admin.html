{% extends 'logbook/base.html' %}
{% block title %}Panel admina{% endblock %}

{% block content %}
<h2 style="font-size:1.2rem;font-weight:700;margin-bottom:20px">Panel administracyjny</h2>

<div class="card">
    <div class="card-title">Użytkownicy</div>
    <div class="table-wrap">
        <table>
            <thead><tr><th>Email</th><th>Imię</th><th>Tier</th><th>Aktywny</th><th>Loty</th><th>Nalot</th><th></th></tr></thead>
            <tbody id="usersBody"><tr><td colspan="7" class="loading"><i class="fa fa-spinner fa-spin"></i></td></tr></tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadAdminData() {
    const [usersResp, statsResp] = await Promise.all([
        fetch('/logbook/api/admin/users'),
        fetch('/logbook/api/admin/stats'),
    ]);
    const users = await usersResp.json();
    const stats = await statsResp.json();

    const statsMap = {};
    stats.forEach(s => { statsMap[s.user_id] = s; });

    const tbody = document.getElementById('usersBody');
    if (!users.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty">Brak użytkowników</td></tr>'; return; }
    tbody.innerHTML = users.map(u => {
        const s = statsMap[u.id] || {};
        const h = Math.floor((s.minutes || 0) / 60);
        const m = (s.minutes || 0) % 60;
        return `<tr>
            <td>${u.email}</td>
            <td>${u.display_name}</td>
            <td><span class="badge badge-info">${u.tier}</span></td>
            <td>${u.is_active ? '<span class="badge badge-success">tak</span>' : '<span class="badge badge-danger">nie</span>'}</td>
            <td>${s.flights || 0}</td>
            <td>${h}h ${m}m</td>
            <td style="display:flex;gap:6px">
                <button class="btn btn-secondary btn-sm" onclick="toggleActive('${u.id}', ${!u.is_active})">${u.is_active ? 'Dezaktywuj' : 'Aktywuj'}</button>
                <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}')"><i class="fa fa-trash"></i></button>
            </td>
        </tr>`;
    }).join('');
}

async function toggleActive(id, active) {
    const resp = await fetch(`/logbook/api/admin/users/${id}`, {
        method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ is_active: active })
    });
    if (resp.ok) { showToast('Zaktualizowano'); loadAdminData(); }
    else showToast('Błąd', 'error');
}

async function deleteUser(id) {
    if (!confirm('Usunąć tego użytkownika i wszystkie jego dane?')) return;
    const resp = await fetch(`/logbook/api/admin/users/${id}`, { method: 'DELETE' });
    if (resp.ok) { showToast('Usunięto'); loadAdminData(); }
    else { const d = await resp.json(); showToast(d.error || 'Błąd', 'error'); }
}

document.addEventListener('DOMContentLoaded', loadAdminData);
</script>
{% endblock %}
