<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GlideLog{% endblock %} — GlidePlan</title>
    <link rel="icon" href="/static/images/favicon.ico" sizes="any">
    <link rel="icon" href="/static/images/icon-192.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="/static/images/apple-touch-icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f0f4f8;
            --card: #ffffff;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
            --danger: #dc2626;
            --warning: #d97706;
            --success: #16a34a;
            --info: #0891b2;
            --nav-bg: #1e293b;
            --nav-text: #cbd5e1;
            --nav-active: #2563eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Nav ── */
        nav {
            background: var(--nav-bg);
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 4px;
            height: 52px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-brand { color: #fff; font-weight: 700; font-size: 1.05rem; margin-right: 16px; text-decoration: none; }
        .nav-brand span { color: var(--primary); }
        nav a {
            color: var(--nav-text);
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.875rem;
            transition: background .15s, color .15s;
        }
        nav a:hover, nav a.active { background: rgba(255,255,255,.1); color: #fff; }
        .nav-spacer { flex: 1; }
        .nav-user { color: var(--nav-text); font-size: 0.8rem; }

        /* ── Layout ── */
        main { flex: 1; padding: 24px 20px 48px; max-width: 1200px; width: 100%; margin: 0 auto; }

        /* ── Cards ── */
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,.06);
            margin-bottom: 16px;
        }
        .card-title { font-size: 0.95rem; font-weight: 600; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .04em; }

        /* ── KPI grid ── */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; margin-bottom: 20px; }
        .kpi { background: var(--card); border-radius: 12px; padding: 18px 20px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
        .kpi-label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
        .kpi-value { font-size: 1.8rem; font-weight: 700; color: var(--text); margin-top: 4px; }
        .kpi-sub { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

        /* ── Charts ── */
        .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 20px; }
        @media (max-width: 700px) { .charts-grid { grid-template-columns: 1fr; } }
        canvas { max-height: 260px; }

        /* ── Table ── */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        th { text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); padding: 8px 12px; border-bottom: 2px solid var(--border); }
        td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8fafc; }

        /* ── Badges / alerts ── */
        .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.72rem; font-weight: 600; }
        .badge-danger  { background: #fee2e2; color: var(--danger); }
        .badge-warning { background: #fef3c7; color: var(--warning); }
        .badge-info    { background: #e0f2fe; color: var(--info); }
        .badge-success { background: #dcfce7; color: var(--success); }

        .alert-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 8px; margin-bottom: 8px; }
        .alert-item.danger  { background: #fee2e2; }
        .alert-item.warning { background: #fef3c7; }
        .alert-item.info    { background: #e0f2fe; }

        /* ── Buttons ── */
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 0.875rem; font-weight: 500; border: none; cursor: pointer; transition: background .15s; text-decoration: none; }
        .btn-primary   { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-secondary { background: var(--border); color: var(--text); }
        .btn-secondary:hover { background: #d1d5db; }
        .btn-danger    { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-sm { padding: 5px 10px; font-size: 0.78rem; }

        /* ── Forms ── */
        .form-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
        .form-group { display: flex; flex-direction: column; gap: 4px; min-width: 140px; flex: 1; }
        label { font-size: 0.8rem; font-weight: 500; color: var(--muted); }
        input, select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.875rem; background: #fff; color: var(--text); }
        input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.15); }

        /* ── Pagination ── */
        .pagination { display: flex; align-items: center; gap: 8px; margin-top: 16px; font-size: 0.875rem; }
        .pagination .page-info { color: var(--muted); flex: 1; }

        /* ── Tab bar ── */
        .tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
        .tab { padding: 8px 16px; font-size: 0.875rem; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

        /* ── Loading / empty ── */
        .loading { text-align: center; color: var(--muted); padding: 40px; }
        .empty    { text-align: center; color: var(--muted); padding: 32px; font-size: 0.9rem; }

        /* ── Toast ── */
        #toast { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
        .toast-msg { padding: 12px 18px; border-radius: 10px; font-size: 0.875rem; color: #fff; box-shadow: 0 4px 16px rgba(0,0,0,.2); animation: slideUp .2s ease; }
        .toast-msg.success { background: var(--success); }
        .toast-msg.error   { background: var(--danger); }
        @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
<nav>
    <a class="nav-brand" href="/logbook/dashboard">Glide<span>Log</span></a>
    <a href="/logbook/dashboard" {% if request.path == '/logbook/dashboard' %}class="active"{% endif %}>
        <i class="fa fa-gauge-high"></i> Dashboard
    </a>
    <a href="/logbook/flights" {% if request.path == '/logbook/flights' %}class="active"{% endif %}>
        <i class="fa fa-plane"></i> Loty
    </a>
    <a href="/logbook/import" {% if request.path == '/logbook/import' %}class="active"{% endif %}>
        <i class="fa fa-file-import"></i> Import
    </a>
    <a href="/logbook/connectors" {% if request.path == '/logbook/connectors' %}class="active"{% endif %}>
        <i class="fa fa-plug"></i> Źródła
    </a>
    {% if current_user.tier == 'admin' %}
    <a href="/logbook/admin" {% if request.path == '/logbook/admin' %}class="active"{% endif %}>
        <i class="fa fa-shield-halved"></i> Admin
    </a>
    {% endif %}
    <div class="nav-spacer"></div>
    <span class="nav-user"><i class="fa fa-user"></i> {{ current_user.display_name }}</span>
    <a href="/auth/logout" style="margin-left:8px"><i class="fa fa-right-from-bracket"></i></a>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<div id="toast"></div>
<script>
function showToast(msg, type='success') {
    const t = document.createElement('div');
    t.className = 'toast-msg ' + type;
    t.textContent = msg;
    document.getElementById('toast').appendChild(t);
    setTimeout(() => t.remove(), 3500);
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
