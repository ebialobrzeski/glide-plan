services:
  postgres_gliding:
    image: postgres:18
    container_name: postgres_gliding
    restart: always
    env_file:
      - .env
    ports:
      - "5434:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-glideplan} -d ${POSTGRES_DB:-gliding_forecast}"]
      interval: 10s
      timeout: 5s
      retries: 5

  glideplan:
    build: .
    container_name: glideplan
    restart: always
    ports:
      - "5000:5000"
    volumes:
      # Persist uploaded files, session data, and logs
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - SECRET_KEY=${SECRET_KEY:-change_this_secret_key_in_production}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-glideplan}:${POSTGRES_PASSWORD:-changeme_secure_password}@postgres_gliding:5432/${POSTGRES_DB:-gliding_forecast}
      - WINDY_API_KEY=${WINDY_API_KEY:-}
      - OPENAIP_API_KEY=${OPENAIP_API_KEY:-}
      - BASE_URL=${BASE_URL:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM_ADDRESS=${RESEND_FROM_ADDRESS:-noreply@glideplan.org}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # Share the login cookie with GlideLog when both run on sibling
      # subdomains (e.g. .glideplan.org); leave empty for single-host setups.
      - SESSION_COOKIE_DOMAIN=${SESSION_COOKIE_DOMAIN:-}
    depends_on:
      postgres_gliding:
        condition: service_healthy

  glidelog:
    build: ./glidelog
    container_name: glidelog
    restart: always
    ports:
      - "5001:5001"
    volumes:
      # Persist logs only — GlideLog holds no local file state
      - ./glidelog/logs:/app/logs
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      # MUST match glideplan's SECRET_KEY so the login session cookie is shared
      - SECRET_KEY=${SECRET_KEY:-change_this_secret_key_in_production}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-glideplan}:${POSTGRES_PASSWORD:-changeme_secure_password}@postgres_gliding:5432/${POSTGRES_DB:-gliding_forecast}
      # Public URL of the main GlidePlan app — used for login/logout links
      - GLIDEPLAN_URL=${GLIDEPLAN_URL:-http://localhost:5000}
      # Set to a shared parent domain (e.g. .glideplan.org) when the two apps
      # live on different subdomains; leave empty for same-host deployments.
      - SESSION_COOKIE_DOMAIN=${SESSION_COOKIE_DOMAIN:-}
      - GLIDELOG_SCHEDULER_ENABLED=${GLIDELOG_SCHEDULER_ENABLED:-1}
    depends_on:
      postgres_gliding:
        condition: service_healthy
